<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇭🇰 홍콩 가족여행 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080810; color: #e0e0e0; font-family: 'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif; min-height: 100vh; }
  .header { position: sticky; top: 0; z-index: 50; background: rgba(8,8,16,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
  .header-inner { max-width: 640px; margin: 0 auto; padding: 16px 16px 0; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .header-icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg,#FF6B6B,#C77DFF); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .header-title { font-size: 16px; font-weight: 800; color: #fff; }
  .header-sub { font-size: 10px; color: #555; letter-spacing: 0.1em; margin-top: 2px; }
  .tabs { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex: 0 0 auto; padding: 7px 14px 10px; border: none; cursor: pointer; background: transparent; border-bottom: 2.5px solid transparent; color: #444; font-weight: 400; font-size: 12px; transition: all 0.18s; text-align: center; border-radius: 6px 6px 0 0; font-family: inherit; white-space: nowrap; }
  .tab.active { font-weight: 700; }
  .tab-date { font-size: 15px; display: block; }
  .tab-day { font-size: 9px; opacity: 0.75; margin-top: 1px; display: block; }
  .body { position: relative; max-width: 640px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Day hero */
  .day-hero { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding: 16px; border-radius: 14px; }
  .day-bar { width: 3px; height: 44px; border-radius: 2px; flex-shrink: 0; }
  .day-date { font-size: 22px; font-weight: 900; color: #fff; line-height: 1.1; }
  .day-date span { color: #555; font-weight: 400; font-size: 16px; }
  .day-label { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; margin-top: 3px; }
  .view-toggle { display: flex; gap: 3px; margin-bottom: 18px; background: rgba(255,255,255,0.04); border-radius: 9px; padding: 3px; }
  .view-btn { flex: 1; padding: 7px; border: none; cursor: pointer; background: transparent; color: #555; font-size: 12px; font-weight: 600; border-radius: 6px; transition: all 0.18s; font-family: inherit; }
  .view-btn.active { background: rgba(255,255,255,0.1); color: #fff; }

  /* Map */
  .schedule-shell { touch-action: pan-y; }
  .schedule-pager { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 18px; padding: 10px 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; }
  .schedule-nav { width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: #ddd; font-size: 16px; cursor: pointer; font-family: inherit; }
  .schedule-nav:disabled { opacity: 0.35; cursor: default; }
  .schedule-summary { flex: 1; text-align: center; }
  .schedule-summary .main { font-size: 13px; font-weight: 800; color: #fff; }
  .schedule-summary .sub { font-size: 10px; color: #666; margin-top: 3px; }
  #map-container { height: 400px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 12px; background: rgba(255,255,255,0.02); }
  .map-frame { width: 100%; height: 100%; border: 0; filter: grayscale(0.08) contrast(1.02); }
  .map-actions { display: flex; justify-content: flex-end; margin-bottom: 12px; }
  .map-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 8px; background: rgba(78,205,196,0.1); border: 1px solid rgba(78,205,196,0.2); color: #4ECDC4; font-size: 11px; font-weight: 700; text-decoration: none; }
  .map-spot-list { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px 14px; }
  .map-spot-list-title { font-size: 9px; color: #3a3a4a; letter-spacing: 0.08em; margin-bottom: 8px; }
  .map-spot-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; border-radius: 8px; transition: background 0.18s ease; }
  .map-spot-item:hover { background: rgba(255,255,255,0.03); }
  .map-spot-item:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.04); }
  .map-spot-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .map-spot-name { font-size: 11px; color: #ccc; font-weight: 600; }
  .map-spot-time { font-size: 9px; color: #444; margin-top: 1px; }
  .leaflet-container { background: #0b1220; font-family: inherit; }
  .leaflet-control-attribution { background: rgba(8,8,16,0.78) !important; color: #8b93a7 !important; }
  .leaflet-control-attribution a { color: #cfd8ea !important; }
  .day-marker { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; border: 2px solid rgba(255,255,255,0.95); box-shadow: 0 8px 18px rgba(0,0,0,0.35); }
  .day-marker.transport { background: #2a2a3a; color: #c7d2fe; }
  .day-marker.spot { background: linear-gradient(135deg,#FF6B6B,#ff9f7f); }

  /* Timeline */
  .timeline { position: relative; }
  .timeline-line { position: absolute; left: 20px; top: 8px; bottom: 8px; width: 1px; }
  .spot-wrap { position: relative; padding-left: 48px; margin-bottom: 18px; }
  .spot-dot { position: absolute; left: 13px; top: 10px; width: 14px; height: 14px; border-radius: 50%; background: #080810; border: 2px solid; z-index: 2; }
  .spot-time { font-size: 9px; color: #444; margin-bottom: 4px; letter-spacing: 0.08em; }
  .spot-card { border-radius: 11px; padding: 11px 13px; cursor: pointer; transition: background 0.15s; border: 1px solid; }
  .spot-card:not(.transport) { background: rgba(255,255,255,0.04); }
  .spot-card.transport { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.04) !important; cursor: default; }
  .spot-inner { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .spot-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .spot-emoji { font-size: 20px; flex-shrink: 0; }
  .spot-name { font-weight: 700; font-size: 13px; color: #efefef; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .spot-name.transport { color: #666; }
  .spot-sub { font-size: 10px; color: #484858; margin-top: 2px; line-height: 1.4; }
  .rest-badge { border-radius: 6px; padding: 2px 8px; font-size: 10px; font-weight: 700; border: 1px solid; }
  .toggle-arrow { font-size: 9px; color: #444; }
  .rests { margin-top: 6px; padding-left: 2px; display: flex; flex-direction: column; gap: 5px; }
  .rest-card { border-radius: 9px; padding: 9px 11px; cursor: pointer; transition: all 0.15s; border: 1px solid; }
  .rest-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .rest-name { font-weight: 700; font-size: 12px; color: #e8e8e8; }
  .rest-cn { font-size: 10px; color: #444; font-weight: 400; margin-left: 4px; }
  .rest-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .rest-menu { font-size: 9px; padding: 1px 6px; border-radius: 3px; font-weight: 700; }
  .rest-price { font-size: 11px; }
  .rest-detail { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
  .rest-desc { font-size: 11px; color: #aaa; line-height: 1.65; margin-bottom: 8px; }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .tag { font-size: 9px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-radius: 4px; padding: 2px 6px; color: #888; }
  .tip-box { background: rgba(255,213,0,0.06); border: 1px solid rgba(255,213,0,0.16); border-radius: 6px; padding: 6px 10px; display: flex; gap: 6px; align-items: flex-start; }
  .tip-text { font-size: 10px; color: #ffd700; line-height: 1.5; }
  .legend { margin-top: 16px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 8px 14px; display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
  .legend-title { font-size: 9px; color: #3a3a4a; letter-spacing: 0.08em; }
  .legend-item { font-size: 10px; color: #505060; }

  /* ── INFO 서브탭 ── */
  .info-subtabs-wrap { overflow-x: auto; scrollbar-width: none; margin-bottom: 20px; }
  .info-subtabs-wrap::-webkit-scrollbar { display: none; }
  .info-subtabs { display: flex; gap: 4px; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 4px; border: 1px solid rgba(255,255,255,0.06); min-width: max-content; }
  .ist { flex: 0 0 auto; padding: 8px 12px; border: none; cursor: pointer; background: transparent; color: #505060; font-size: 11px; font-weight: 600; border-radius: 8px; transition: all 0.2s; font-family: inherit; white-space: nowrap; display: flex; flex-direction: column; align-items: center; gap: 2px; border: 1px solid transparent; }
  .ist .si { font-size: 18px; }
  .ist .sl { font-size: 9px; }
  .ist.active { background: rgba(78,205,196,0.12); color: #4ECDC4; border-color: rgba(78,205,196,0.25); }

  /* Info Common */
  .info-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 14px; margin-bottom: 8px; }
  .info-card-header { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 10px; }
  .sec-label { font-size: 10px; font-weight: 700; color: #4ECDC4; letter-spacing: 0.12em; margin-bottom: 10px; margin-top: 20px; }
  .sec-label:first-child { margin-top: 0; }
  .info-steps { display: flex; flex-direction: column; gap: 8px; }
  .info-step { display: flex; gap: 10px; align-items: flex-start; }
  .isn { width: 22px; height: 22px; border-radius: 50%; background: rgba(78,205,196,0.15); border: 1px solid rgba(78,205,196,0.35); color: #4ECDC4; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .isc { font-size: 11px; color: #aaa; line-height: 1.65; flex: 1; }
  .isc strong { color: #e0e0e0; display: block; margin-bottom: 2px; }
  .isc em { color: #4ECDC4; font-style: normal; font-size: 10px; }

  /* Phrase */
  .phrase-row { display: flex; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); gap: 8px; }
  .phrase-row:last-child { border-bottom: none; }
  .pko { font-size: 11px; color: #999; flex: 1.2; }
  .pcn { font-size: 13px; color: #4ECDC4; font-weight: 600; flex: 1; }
  .ppr { font-size: 10px; color: #555; flex: 1.3; font-style: italic; }

  /* Chips */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip { padding: 5px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
  .ct { background: rgba(78,205,196,0.1); border: 1px solid rgba(78,205,196,0.2); color: #4ECDC4; }
  .cy { background: rgba(255,213,0,0.08); border: 1px solid rgba(255,213,0,0.2); color: #ffd700; }
  .cr { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2); color: #FF6B6B; }
  .cp { background: rgba(199,125,255,0.08); border: 1px solid rgba(199,125,255,0.2); color: #C77DFF; }

  /* Emergency */
  .emg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .emg-item { background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.15); border-radius: 10px; padding: 12px; }
  .emg-label { font-size: 9px; color: #666; letter-spacing: 0.06em; margin-bottom: 4px; }
  .emg-num { font-size: 18px; font-weight: 900; color: #FF6B6B; }
  .emg-desc { font-size: 9px; color: #555; margin-top: 3px; line-height: 1.4; }

  /* Apps */
  .app-list { display: flex; flex-direction: column; gap: 6px; }
  .app-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
  .app-icon { font-size: 20px; flex-shrink: 0; }
  .app-name { font-size: 12px; font-weight: 700; color: #e0e0e0; }
  .app-desc { font-size: 10px; color: #666; margin-top: 1px; }

  /* Overview – Dual clock */
  .dual-clock { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .clock-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; text-align: center; }
  .clock-card.hk { border-color: rgba(78,205,196,0.25); background: rgba(78,205,196,0.06); }
  .clock-city { font-size: 10px; color: #555; letter-spacing: 0.08em; margin-bottom: 4px; }
  .clock-time { font-size: 28px; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; letter-spacing: -1px; }
  .clock-card.hk .clock-time { color: #4ECDC4; }
  .clock-date { font-size: 9px; color: #444; margin-top: 3px; }

  /* Overview – stat grid */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
  .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px 8px; text-align: center; }
  .stat-label { font-size: 9px; color: #444; letter-spacing: 0.05em; margin-bottom: 5px; }
  .stat-val { font-size: 22px; font-weight: 900; line-height: 1; }
  .stat-unit { font-size: 9px; color: #444; margin-top: 3px; }

  /* Weather */
  .wx-hero { display: flex; align-items: center; gap: 16px; padding: 20px; background: rgba(78,205,196,0.06); border: 1px solid rgba(78,205,196,0.18); border-radius: 14px; margin-bottom: 8px; }
  .wx-emoji { font-size: 54px; line-height: 1; }
  .wx-right { flex: 1; }
  .wx-desc { font-size: 14px; font-weight: 700; color: #e0e0e0; margin-bottom: 3px; }
  .wx-temp { font-size: 44px; font-weight: 900; color: #4ECDC4; line-height: 1; }
  .wx-feel { font-size: 11px; color: #777; margin-top: 4px; }
  .wx-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 8px; }
  .wx-stat { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px; text-align: center; }
  .wx-stat-label { font-size: 9px; color: #444; margin-bottom: 4px; }
  .wx-stat-val { font-size: 16px; font-weight: 700; color: #4ECDC4; }
  .wx-update { font-size: 9px; color: #2a2a3a; text-align: right; margin-top: 4px; }
  .wx-loading { text-align: center; padding: 40px 20px; color: #333; font-size: 12px; }
  .wx-refresh { background: rgba(78,205,196,0.1); border: 1px solid rgba(78,205,196,0.2); border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 11px; color: #4ECDC4; font-family: inherit; font-weight: 600; display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }

  /* Currency */
  .rate-hero { text-align: center; padding: 24px 20px; background: rgba(255,213,0,0.06); border: 1px solid rgba(255,213,0,0.2); border-radius: 14px; margin-bottom: 8px; }
  .rate-label { font-size: 10px; color: #ffd700; letter-spacing: 0.12em; margin-bottom: 6px; }
  .rate-big { font-size: 52px; font-weight: 900; color: #ffd700; line-height: 1; }
  .rate-unit { font-size: 14px; color: #888; margin-top: 6px; }
  .rate-update { font-size: 9px; color: #444; margin-top: 4px; }
  .convert-table { margin-top: 4px; }
  .conv-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 4px; border: 1px solid rgba(255,255,255,0.05); }
  .conv-hkd { font-size: 13px; color: #ffd700; font-weight: 700; }
  .conv-krw { font-size: 13px; color: #e0e0e0; font-weight: 700; }
  .rate-loading { text-align: center; padding: 40px 20px; color: #333; font-size: 12px; }
  .converter-card { margin-top: 8px; }
  .converter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .converter-field { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 12px; }
  .converter-label { font-size: 10px; color: #666; letter-spacing: 0.08em; margin-bottom: 8px; }
  .converter-input { width: 100%; background: transparent; border: none; color: #fff; font-size: 24px; font-weight: 800; outline: none; font-family: inherit; }
  .converter-input::-webkit-outer-spin-button,
  .converter-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .converter-input[type=number] { -moz-appearance: textfield; }
  .converter-meta { margin-top: 8px; font-size: 10px; color: #666; line-height: 1.5; }

  /* Route items */
  .route-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 4px; border: 1px solid rgba(255,255,255,0.05); }
  .route-from { font-size: 11px; color: #aaa; }
  .route-info { text-align: right; }
  .route-time { font-size: 12px; font-weight: 700; color: #fff; }
  .route-fare { font-size: 9px; color: #555; margin-top: 1px; }

  .expense-lock { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 20px; }
  .expense-lock-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .expense-lock-sub { font-size: 12px; color: #888; line-height: 1.6; margin-bottom: 14px; }
  .expense-form { display: flex; flex-direction: column; gap: 10px; }
  .expense-input, .expense-select { width: 100%; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #fff; border-radius: 10px; padding: 12px 14px; font-size: 16px; font-family: inherit; }
  .expense-input::placeholder { color: #666; }
  .expense-btn { border: none; border-radius: 10px; padding: 12px 14px; background: linear-gradient(135deg,#FFD93D,#FF9F1C); color: #111; font-size: 13px; font-weight: 800; cursor: pointer; font-family: inherit; }
  .expense-btn.secondary { background: rgba(255,255,255,0.05); color: #ddd; border: 1px solid rgba(255,255,255,0.08); }
  .expense-error { font-size: 11px; color: #FF6B6B; min-height: 16px; }
  .expense-hero { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
  .expense-total { font-size: 28px; font-weight: 900; color: #FFD93D; line-height: 1; margin-top: 6px; }
  .expense-total-sub { font-size: 11px; color: #666; margin-top: 4px; }
  .expense-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
  .expense-stat { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px; text-align: center; }
  .expense-stat-label { font-size: 10px; color: #666; margin-bottom: 4px; }
  .expense-stat-value { font-size: 15px; font-weight: 800; color: #fff; }
  .expense-stat-sub { font-size: 10px; color: #888; margin-top: 4px; }
  .expense-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .expense-date-group { margin-top: 14px; }
  .expense-date-heading { font-size: 11px; font-weight: 800; color: #ffd166; letter-spacing: 0.04em; margin-bottom: 8px; }
  .expense-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; }
  .expense-item-left { min-width: 0; }
  .expense-item-name { font-size: 13px; font-weight: 700; color: #fff; }
  .expense-item-meta { font-size: 10px; color: #666; margin-top: 4px; }
  .expense-item-amount { font-size: 14px; font-weight: 800; color: #FFD93D; text-align: right; }
  .expense-item-delete { margin-top: 6px; border: none; background: transparent; color: #FF6B6B; font-size: 11px; cursor: pointer; font-family: inherit; }
  .empty-state { padding: 24px 16px; text-align: center; font-size: 12px; color: #666; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 12px; }
  .expense-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
  .expense-sync { font-size: 10px; color: #666; margin-top: 8px; line-height: 1.5; }
  .expense-hint { font-size: 10px; color: #666; margin-top: 6px; line-height: 1.5; }
  .admin-note { font-size: 11px; color: #999; line-height: 1.7; }
  .admin-success { font-size: 11px; color: #4ECDC4; min-height: 16px; }

function loadExpenses() {
  try {
    const raw = localStorage.getItem(EXPENSE_STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function saveExpenses() {
  localStorage.setItem(EXPENSE_STORAGE_KEY, JSON.stringify(expenseEntries));
}

function getExpenseHkdAmount(item) {
  if (Number.isFinite(Number(item.hkdAmount))) return Number(item.hkdAmount);
  return Number(item.amount || 0);
}

function getExpenseKrwAmount(item) {
  if (Number.isFinite(Number(item.krwAmount))) return Math.round(Number(item.krwAmount));
  if (Number.isFinite(Number(item.rateUsed))) return Math.round(getExpenseHkdAmount(item) * Number(item.rateUsed));
  if (Number.isFinite(Number(rateData && rateData.krw))) return Math.round(getExpenseHkdAmount(item) * Number(rateData.krw));
  return 0;
}

function getTodayDateValue() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function getExpenseDateLabel(item) {
  if (item.expenseDate) return item.expenseDate;
  if (typeof item.createdAt === 'string') {
    const match = item.createdAt.match(/^(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})\./);
    if (match) {
      const [, year, month, day] = match;
      return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    }
  }
  return getTodayDateValue();
}

async function sha256Hex(text) {
  const bytes = new TextEncoder().encode(text);
  const hashBuffer = await crypto.subtle.digest('SHA-256', bytes);
  return Array.from(new Uint8Array(hashBuffer)).map(byte => byte.toString(16).padStart(2, '0')).join('');
}

async function initExpenseRemote() {
  if (!hasFirebaseConfig() || !window.firebase) return;
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    firebaseDb = firebase.firestore();
    expenseSyncStatus = 'Firebase 연결 중...';
    expenseRemoteEnabled = true;
    const snapshot = await firebaseDb.collection(FIREBASE_COLLECTION).doc(FIREBASE_DOCUMENT).get();
    if (snapshot.exists) {
      const data = snapshot.data() || {};
      if (Array.isArray(data.entries)) {
        expenseEntries = data.entries;
        saveExpenses();
      }
      if (typeof data.passwordHash === 'string' && data.passwordHash.trim()) {
        remotePasswordHash = data.passwordHash.trim();
      }
      expenseSyncStatus = `Firebase 동기화 사용 중 · ${new Date().toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' })}`;
    } else {
      await pushExpensesToRemote();
      expenseSyncStatus = `Firebase 초기화 완료 · ${new Date().toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' })}`;
    }
  } catch (error) {
    console.error(error);
    firebaseDb = null;
    expenseRemoteEnabled = false;
    expenseSyncStatus = `Firebase 연결 실패 · ${error && error.message ? error.message : '로컬 저장 사용'}`;
  }

  if (activeTab === 'expense') renderExpense();
}

async function pushExpensesToRemote() {

    passwordHash: remotePasswordHash || DEFAULT_EXPENSE_PASSWORD_HASH,
    updatedAt: new Date().toISOString(),

function formatNumberInput(value, digits = 2) {
  const num = Number(value);
  if (!Number.isFinite(num)) return '';
  return num.toFixed(digits).replace(/\.00$/, '').replace(/(\.\d*[1-9])0+$/, '$1');
}

function updateCurrencyInputs(source, rawValue) {
  const rateNum = rateData ? Number(rateData.krw) : null;
  if (!rateNum) return;
  if (rawValue === '') {
    currencyDraft = { hkd: '', krw: '' };
  } else {
    const inputNum = Number(rawValue);
    if (!Number.isFinite(inputNum)) return;
    if (source === 'hkd') {
      currencyDraft.hkd = rawValue;
      currencyDraft.krw = formatNumberInput(inputNum * rateNum, 0);
    } else {
      currencyDraft.krw = rawValue;
      currencyDraft.hkd = formatNumberInput(inputNum / rateNum, 2);
    }
  }

  const hkdInput = document.getElementById('currency-hkd');
  const krwInput = document.getElementById('currency-krw');
  if (hkdInput) hkdInput.value = currencyDraft.hkd;
  if (krwInput) krwInput.value = currencyDraft.krw;
}

function handleExpenseCurrencyChange(currency) {
  if (!rateData) {
    expenseSyncStatus = `${currency} 입력용 환율을 불러오는 중...`;
    fetchRate();
    if (activeTab === 'expense') renderExpense();
  }
}

async function fetchRateByDate(dateValue = 'latest') {
  if (rateCache[dateValue]) return rateCache[dateValue];
  const endpoint = dateValue === 'latest'
    ? 'https://api.frankfurter.dev/v1/latest?base=HKD&symbols=KRW'
    : `https://api.frankfurter.dev/v1/${dateValue}?base=HKD&symbols=KRW`;
  const response = await fetch(endpoint);
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  const data = await response.json();
  const parsed = { krw: data.rates.KRW, date: data.date };
  rateCache[dateValue] = parsed;
  if (parsed.date) rateCache[parsed.date] = parsed;
  return parsed;
}

function csvEscape(value) {
  return `"${String(value ?? '').replace(/"/g, '""')}"`;
}

function exportExpensesCsv() {
  const rows = [
    ['제목', '금액(HKD)', '금액(KRW)', '결제수단', '메모', '날짜'],
    ...expenseEntries.map((item) => [
      item.title,
      Number(getExpenseHkdAmount(item)).toFixed(2),
      item.krwAmount ?? (item.rateUsed ? Math.round(getExpenseHkdAmount(item) * Number(item.rateUsed)) : ''),
      item.payment === 'cash' ? '현금' : '카드',
      item.memo || '',
      getExpenseDateLabel(item),
    ]),
  ];
  const csv = '\uFEFF' + rows.map((row) => row.map(csvEscape).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 16).replace(/[-:T]/g, '');
  link.href = url;
  link.download = `hongkong-expenses-${stamp}.csv`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

/* ─── 지도 ─── */
function getDayMapConfig(dayIndex) {
  const spots = days[dayIndex].spots.filter(s => s.lat && s.lng);
  if (!spots.length) return null;
  const latCenter = spots.reduce((sum, spot) => sum + spot.lat, 0) / spots.length;
  const lngCenter = spots.reduce((sum, spot) => sum + spot.lng, 0) / spots.length;
  const latSpan = Math.max(...spots.map(spot => spot.lat)) - Math.min(...spots.map(spot => spot.lat));
  const lngSpan = Math.max(...spots.map(spot => spot.lng)) - Math.min(...spots.map(spot => spot.lng));
  const spread = Math.max(latSpan, lngSpan);
  const zoom = spread > 0.2 ? 10 : spread > 0.1 ? 11 : spread > 0.05 ? 12 : 13;
  return { latCenter, lngCenter, zoom, spots };
}

function getGoogleMapEmbedUrl(dayIndex) {
  const config = getDayMapConfig(dayIndex);
  if (!config) return '';
  return `https://www.google.com/maps?q=${config.latCenter},${config.lngCenter}&z=${config.zoom}&output=embed`;
}

function getGoogleMapExternalUrl(dayIndex) {
  const config = getDayMapConfig(dayIndex);
  if (!config) return 'https://maps.google.com';
  const query = config.spots.map(spot => `${spot.lat},${spot.lng}`).join('/');
  return `https://www.google.com/maps/dir/${query}`;
}

function destroyDayMap() {
  dayMapMarkers = [];
  if (dayMap) {
    dayMap.remove();
    dayMap = null;
  }
}

function createMarkerIcon(label, isTransport) {
  return L.divIcon({
    className: '',
    html: `<div class="day-marker ${isTransport ? 'transport' : 'spot'}">${label}</div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 15],
    popupAnchor: [0, -14],
  });
}

function initDayMap(dayIndex) {
  const container = document.getElementById('map-container');
  const config = getDayMapConfig(dayIndex);
  if (!container || !config || !window.L) return;
  destroyDayMap();

  dayMap = L.map(container, {
    zoomControl: true,
    attributionControl: true,
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors',
  }).addTo(dayMap);

  const bounds = [];
  let markerNumber = 1;
  config.spots.forEach((spot, index) => {
    const isTransport = spot.type === 'transport';
    const label = markerNumber++;
    const marker = L.marker([spot.lat, spot.lng], {
      icon: createMarkerIcon(label, isTransport),
      keyboard: true,
    }).addTo(dayMap);
    marker.bindPopup(`<strong>${spot.name}</strong><br>${spot.time}<br>${spot.sub}`);
    dayMapMarkers[index] = marker;
    bounds.push([spot.lat, spot.lng]);
  });

  if (bounds.length) {
    dayMap.fitBounds(bounds, { padding: [28, 28], maxZoom: 15 });
  }
}

function focusMapSpot(index) {
  const marker = dayMapMarkers[index];
  if (!dayMap || !marker) return;
  const latLng = marker.getLatLng();
  dayMap.flyTo(latLng, Math.max(dayMap.getZoom(), 14), { duration: 0.6 });
  marker.openPopup();
}

  } else {
    html += `<div class="timeline"><div class="timeline-line" style="background:linear-gradient(180deg,${day.color}88,transparent);"></div>`;

      const dotC = isT?'#2a2a3a':day.color;
      const dotS = isT?'':'box-shadow:0 0 10px '+day.color+'77;';

      html += `

          <div class="spot-dot" style="border-color:${dotC};${dotS}${isT?'background:#111;':''}"></div>
          <div class="spot-time">${spot.time}</div>
          <div class="spot-card ${isT?'transport':''}" style="border-color:${isT?'rgba(255,255,255,0.04)':day.color+'2a'};"
            ${spot.restaurants?`onclick="toggleSpot(${si})"`:''}>
            <div class="spot-inner">
              <div class="spot-left">
                <span class="spot-emoji">${spot.icon}</span>
                <div>
                  <div class="spot-name ${isT?'transport':''}">${spot.name}</div>
                  <div class="spot-sub">${spot.sub}</div>
                </div>
              </div>
              ${spot.restaurants?`
                <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
                  <div class="rest-badge" style="background:${day.color}20;border-color:${day.color}40;color:${day.color};">🍽 ${spot.restaurants.length}</div>
                  <span class="toggle-arrow">${sOpen?'▲':'▼'}</span>
                </div>`:''}
            </div>
          </div>
      `;
      if (spot.restaurants && sOpen) {
        html += `<div class="rests">`;
        spot.restaurants.forEach((r, ri) => {
          const rk = `${si}-${ri}`;
          const rO = expandedRest===rk;
          html += `
            <div class="rest-card" style="background:${rO?'rgba(255,255,255,0.07)':'rgba(255,255,255,0.03)'};border-color:${rO?day.color+'50':'rgba(255,255,255,0.07)'};"
              onclick="toggleRest('${rk}')">
              <div class="rest-header">
                <div style="flex:1;min-width:0;">
                  <div><span class="rest-name">${r.name}</span>${r.name_cn?`<span class="rest-cn">${r.name_cn}</span>`:''}</div>
                  <div class="rest-meta">
                    <span class="rest-menu" style="background:${day.color}1e;color:${day.color};">${r.menu}</span>
                    <span class="rest-price">${r.price}</span>
                  </div>
                </div>
                <span class="toggle-arrow">${rO?'▲':'▼'}</span>
              </div>
              ${rO?`<div class="rest-detail">
                <div class="rest-desc">${r.desc}</div>
                <div class="tags">${r.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
                <div class="tip-box"><span style="font-size:12px;">💡</span><span class="tip-text">${r.tip}</span></div>
              </div>`:''}

        });
        html += `</div>`;
      }
      html += `</div>`;
    });
    html += `</div>
      <div class="legend">
        <span class="legend-title">가격대 (HKD/인)</span>
        <span class="legend-item">💰 ~100</span>
        <span class="legend-item">💰💰 100~200</span>
        <span class="legend-item">💰💰💰 200~400</span>
        <span class="legend-item">💰💰💰💰 400+</span>
      </div>`;
  }
  html += `</div>`;
  document.getElementById('body').innerHTML = html;
  if (activeView === 'map') initDayMap(activeDay);
  bindScheduleSwipe();
}

  const total = expenseEntries.reduce((sum, item) => sum + getExpenseHkdAmount(item), 0);

  };

  const cashKrw = expenseEntries.filter(item => item.payment === 'cash').reduce((sum, item) => sum + getExpenseKrwAmount(item), 0);
  const defaultExpenseDate = getTodayDateValue();
  const groupedExpenses = expenseEntries.reduce((acc, item, index) => {
    const dateKey = getExpenseDateLabel(item);
    if (!acc[dateKey]) acc[dateKey] = [];
    acc[dateKey].push({ item, index });
    return acc;
  }, {});

    <div class="expense-date-group">
      <div class="expense-date-heading">${dateKey}</div>
      ${groupedExpenses[dateKey].map(({ item, index }) => `

            <button class="expense-item-delete" type="button" onclick="deleteExpense(${index})">삭제</button>
          </div>
        </div>`).join('')}
    </div>`).join('');

  document.getElementById('body').innerHTML = `
    <div class="info-card">
      <div class="expense-hero">
        <div>
          <div class="info-card-header">💳 여행 지출</div>
          <div class="expense-total">HKD ${total.toLocaleString()}</div>
          <div class="expense-total-sub">₩${totalKrw.toLocaleString()} · 항목 ${expenseEntries.length}개 · ${expenseRemoteEnabled ? 'Firebase와 동기화' : '이 기기에 자동 저장'}</div>

        </div>
        <div class="expense-actions">
          <button class="expense-btn secondary" type="button" onclick="exportExpensesCsv()">엑셀 내보내기</button>
          <button class="expense-btn secondary" type="button" onclick="lockExpense()">잠금</button>
        </div>
      </div>
      <div class="expense-grid">
        <div class="expense-stat">
          <div class="expense-stat-label">전체 합계</div>
          <div class="expense-stat-value">HKD ${total.toLocaleString()}</div>
          <div class="expense-stat-sub">₩${totalKrw.toLocaleString()}</div>
        </div>
        <div class="expense-stat">
          <div class="expense-stat-label">카드</div>
          <div class="expense-stat-value">HKD ${byPayment.card.toLocaleString()}</div>
          <div class="expense-stat-sub">₩${cardKrw.toLocaleString()}</div>
        </div>
        <div class="expense-stat">
          <div class="expense-stat-label">현금</div>
          <div class="expense-stat-value">HKD ${byPayment.cash.toLocaleString()}</div>
          <div class="expense-stat-sub">₩${cashKrw.toLocaleString()}</div>
        </div>
      </div>

        <input class="expense-input" name="title" type="text" placeholder="예: 디즈니 점심">

          <input class="expense-input" name="amount" type="number" min="0" step="0.01" placeholder="금액">
          <select class="expense-select" name="currency" onchange="handleExpenseCurrencyChange(this.value)">
            <option value="HKD">HKD</option>
            <option value="KRW">KRW</option>
          </select>
        </div>
        <select class="expense-select" name="payment">
          <option value="card">카드</option>
          <option value="cash">현금</option>
        </select>
        <input class="expense-input" name="expenseDate" type="date" value="${defaultExpenseDate}">
        <input class="expense-input" name="memo" type="text" placeholder="메모 (선택)">
        <button class="expense-btn" type="submit">지출 추가</button>
      </form>
    </div>
    <div class="expense-list">
      ${expenseEntries.length ? groupedExpenseHtml : `<div class="empty-state">아직 저장된 지출이 없습니다. 위에서 항목을 추가해보세요.</div>`}
    </div>`;
}

function renderOverview() {

  const msLeft = dep - now;

    const days_ = Math.floor(msLeft/86400000);

    countdownHtml = `<div class="stat-card" style="border-color:rgba(255,107,107,0.2);background:rgba(255,107,107,0.05);">
      <div class="stat-label">출발까지</div>

      countdownHtml = `<div class="stat-card" style="border-color:rgba(199,125,255,0.2);background:rgba(199,125,255,0.05);">

      <div class="info-card-header">🗓 일정 요약</div>
      <div style="font-size:11px;color:#aaa;line-height:2.0;">
        <span style="color:#FF6B6B;font-weight:700;">5/1 목</span> — 홍콩 도착 · 침사추이 야경 · 심포니 오브 라이츠<br>

/* ── 날씨 ── */
function wmoToKo(code) {
  if (code === 0) return {txt:'맑음', emoji:'☀️'};
  if (code <= 2) return {txt:'대체로 맑음', emoji:'🌤️'};
  if (code === 3) return {txt:'흐림', emoji:'☁️'};
  if (code <= 48) return {txt:'안개', emoji:'🌫️'};
  if (code <= 57) return {txt:'이슬비', emoji:'🌦️'};
  if (code <= 67) return {txt:'비', emoji:'🌧️'};
  if (code <= 77) return {txt:'눈', emoji:'❄️'};
  if (code <= 82) return {txt:'소나기', emoji:'🌦️'};
  if (code <= 84) return {txt:'강한 소나기', emoji:'⛈️'};
  if (code <= 99) return {txt:'뇌우', emoji:'⛈️'};
  return {txt:'불명', emoji:'🌀'};
}

/* ─── 실시간: 시계 ─── */
const dayKo = ['일','월','화','수','목','금','토'];
function tickClock() {
  const sel = document.getElementById('clock-sel');
  const hk  = document.getElementById('clock-hk');
  const dSel = document.getElementById('date-sel');
  const dHk  = document.getElementById('date-hk');
  if (!sel || !hk) { stopClock(); return; }
  const now = new Date();
  const fmt = (d) => d.toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const dfmt = (d) => `${d.getMonth()+1}/${d.getDate()}(${dayKo[d.getDay()]})`;
  const seoulTime = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const hkTime = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Hong_Kong'}));
  sel.textContent = fmt(seoulTime);
  hk.textContent  = fmt(hkTime);
  dSel.textContent = dfmt(seoulTime);
  dHk.textContent  = dfmt(hkTime);
}
function startClock() {
  tickClock();
  clockTimer = setInterval(tickClock, 1000);
}
function stopClock() {
  if (clockTimer) { clearInterval(clockTimer); clockTimer = null; }
}

/* ─── 실시간: 날씨 ─── */
function fetchWeather() {
  const el = document.getElementById('wx-loading');
  if (el) el.innerHTML = '<div class="wx-loading">불러오는 중... ⏳</div>';
  fetch('https://api.open-meteo.com/v1/forecast?latitude=22.32&longitude=114.17&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation&timezone=Asia%2FHong_Kong')
    .then((r) => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(d => {
      if (!d || !d.current) throw new Error('NO_CURRENT_WEATHER');
      wxData = { current: d.current, fetched: new Date().toLocaleTimeString('ko-KR',{timeZone:'Asia/Seoul',hour12:false,hour:'2-digit',minute:'2-digit'}) };
      if (activeInfoTab === 'weather') renderInfo();
    })
    .catch((error) => {
      console.error(error);
      const el2 = document.getElementById('wx-loading');
      if (el2) el2.innerHTML = '<div class="wx-loading" style="color:#FF6B6B;">날씨 정보를 가져올 수 없습니다<br><small>인터넷 연결을 확인해주세요</small></div>';
    });
}

/* ─── 실시간: 환율 ─── */
function fetchRate() {
  const el = document.getElementById('rate-loading');
  if (el) el.innerHTML = '<div class="rate-loading">불러오는 중... ⏳</div>';
  fetchRateByDate('latest')
    .then((d) => {
      rateData = d;
      if (activeInfoTab === 'currency') renderInfo();
      if (activeTab === 'expense') renderExpense();
    })
    .catch(() => {
      const el2 = document.getElementById('rate-loading');
      if (el2) el2.innerHTML = '<div class="rate-loading" style="color:#FF6B6B;">환율 정보를 가져올 수 없습니다<br><small>인터넷 연결을 확인해주세요</small></div>';
    });
}

function bindScheduleSwipe() {
  const el = document.getElementById('schedule-shell');
  if (!el) return;
  el.addEventListener('touchstart', (event) => {
    touchStartX = event.changedTouches[0].clientX;
  }, { passive: true });
  el.addEventListener('touchend', (event) => {
    if (touchStartX === null) return;
    const delta = event.changedTouches[0].clientX - touchStartX;
    touchStartX = null;
    if (Math.abs(delta) < 50) return;
    if (delta < 0) nextDay();
    else prevDay();
  }, { passive: true });
}

async function unlockExpense(event) {
  event.preventDefault();
  const input = document.getElementById('expense-password');
  if (!input) return;
  const inputHash = await sha256Hex(input.value);
  if (inputHash === remotePasswordHash) {
    expenseUnlocked = true;
    expenseError = '';
    localStorage.setItem(EXPENSE_AUTH_KEY, 'true');
    renderExpense();
    return;
  }
  expenseError = '비밀번호가 맞지 않습니다.';
  renderExpense();
}

function lockExpense() {
  expenseUnlocked = false;
  expenseError = '';
  localStorage.removeItem(EXPENSE_AUTH_KEY);
  renderExpense();
}

async function addExpense(event) {
  event.preventDefault();
  const form = event.target;
  const title = form.title.value.trim();
  const amount = Number(form.amount.value);
  const currency = form.currency.value;
  const expenseDate = form.expenseDate.value || getTodayDateValue();
  const memo = form.memo.value.trim();
  if (!title || !amount) return;
  let hkdAmount = amount;
  let appliedRate = rateData ? Number(rateData.krw) : null;
  let appliedRateDate = rateData ? rateData.date : getTodayDateValue();
  let krwAmount = currency === 'KRW' ? Math.round(amount) : null;
  expenseSyncStatus = `${expenseDate} 환율을 확인하는 중...`;
  renderExpense();
  try {
    const historicalRate = await fetchRateByDate(expenseDate);
    appliedRate = Number(historicalRate.krw);
    appliedRateDate = historicalRate.date || expenseDate;
  } catch (error) {
    console.error(error);
    expenseSyncStatus = '선택 날짜의 환율을 가져오지 못했습니다.';
    renderExpense();
    return;
  }

  if (currency === 'KRW') {
    hkdAmount = Number((amount / appliedRate).toFixed(2));
  } else {
    krwAmount = Math.round(hkdAmount * appliedRate);
  }
  expenseEntries.unshift({
    title,
    amount: hkdAmount,
    hkdAmount,
    originalAmount: amount,
    currency,
    payment: form.payment.value,
    expenseDate,
    rateUsed: appliedRate,
    rateDate: appliedRateDate,
    krwAmount,
    memo,
  });
  syncExpenses();
  renderExpense();
}

function deleteExpense(index) {
  expenseEntries.splice(index, 1);
  syncExpenses();
  renderExpense();
}

async function changeExpensePassword(event) {
  event.preventDefault();
  adminError = '';
  adminSuccess = '';
  const form = event.target;
  const currentPassword = form.currentPassword.value;
  const nextPassword = form.nextPassword.value;
  const confirmPassword = form.confirmPassword.value;

  if (!currentPassword || !nextPassword || !confirmPassword) {
    adminError = '모든 항목을 입력해주세요.';
    renderAdmin();
    return;
  }
  if (nextPassword !== confirmPassword) {
    adminError = '새 비밀번호 확인이 일치하지 않습니다.';
    renderAdmin();
    return;
  }
  if (nextPassword.length < 4) {
    adminError = '비밀번호는 4자 이상으로 입력해주세요.';
    renderAdmin();
    return;
  }

  const currentHash = await sha256Hex(currentPassword);
  if (currentHash !== remotePasswordHash) {
    adminError = '현재 비밀번호가 맞지 않습니다.';
    renderAdmin();
    return;
  }

  const nextHash = await sha256Hex(nextPassword);
  try {
    await updateRemotePasswordHash(nextHash);
    adminSuccess = '비밀번호를 변경했습니다.';
    renderAdmin();
  } catch (error) {
    console.error(error);
    adminError = `비밀번호 저장 실패: ${error && error.message ? error.message : '알 수 없는 오류'}`;
    renderAdmin();
  }
}

/* ─── AI 채팅 ─── */
function switchAI() { stopClock(); activeTab = 'ai'; render(); }

function renderAI() {
  const body = document.getElementById('body');
  const msgsHtml = aiMessages.length === 0
    ? `<div class="ai-bubble assistant">안녕하세요! 홍콩 여행에 대해 뭐든 물어보세요 😊<br><br>예: "3일차 일정 알려줘", "포린수도원 채식 식당 어때?", "환전 얼마나 해야 해?"</div>`
    : aiMessages.map(m => `<div class="ai-bubble ${m.role === 'user' ? 'user' : 'assistant'}">${m.role === 'user' ? escHtml(m.text) : m.text}</div>`).join('');

  body.innerHTML = `
    <div class="ai-wrap">
      <div class="ai-topbar">
        <span class="ai-model-badge">Gemini 2.0 Flash Lite · 무료</span>
        <button class="ai-clear-btn" onclick="aiClear()">대화 초기화</button>
      </div>
      <div class="ai-msgs" id="ai-msgs">${msgsHtml}${aiLoading ? '<div class="ai-bubble assistant thinking">답변 생성 중...</div>' : ''}</div>
      <div class="ai-input-row">
        <textarea class="ai-input" id="ai-input" placeholder="질문을 입력하세요..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();aiSend();}"></textarea>
        <button class="ai-send" id="ai-send-btn" onclick="aiSend()" ${aiLoading ? 'disabled' : ''}>↑</button>
      </div>
    </div>`;
  scrollAIMsgs();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function scrollAIMsgs() {
  const el = document.getElementById('ai-msgs');
  if (el) el.scrollTop = el.scrollHeight;
}

function saveAIKey() {
  const val = (document.getElementById('ai-key-input')?.value || '').trim();
  if (!val) return;
  aiKey = val;
  localStorage.setItem(AI_KEY_STORAGE, aiKey);
  renderAI();
}

function aiClear() {
  aiMessages = [];
  aiLoading = false;
  renderAI();
}

async function aiSend() {
  const input = document.getElementById('ai-input');
  const text = (input?.value || '').trim();
  if (!text || aiLoading) return;
  if (input) input.value = '';

  aiMessages.push({ role: 'user', text });
  aiLoading = true;
  renderAI();

  try {
    const contents = aiMessages.map(m => ({
      role: m.role === 'user' ? 'user' : 'model',
      parts: [{ text: m.text }]
    }));
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${encodeURIComponent(aiKey)}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: AI_SYSTEM_PROMPT }] },
          contents,
          generationConfig: { maxOutputTokens: 1024, temperature: 0.7 }
        })
      }
    );
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || '응답을 받지 못했습니다.';
    aiMessages.push({ role: 'model', text: formatAIReply(reply) });
  } catch (e) {
    aiMessages.push({ role: 'model', text: `⚠️ 오류: ${e.message}` });
  }

  aiLoading = false;
  renderAI();
}

function formatAIReply(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}

render();
initExpenseRemote();
